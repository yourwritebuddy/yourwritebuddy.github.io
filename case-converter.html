<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WriteBuddy - Case Converter</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 5px;
        }
        p.subtitle {
            color: #7f8c8d;
            margin-top: 0;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 12px;
            box-sizing: border-box;
            border: 2px solid #bdc3c7;
            border-radius: 4px;
            font-size: 16px;
            resize: vertical;
            margin-bottom: 20px;
        }
        textarea:focus {
            border-color: #0070f3;
            outline: none;
        }
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            background-color: #0070f3;
            color: white;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #0051b3;
        }
        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #7f8c8d;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            color: #333;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Case Converter</h1>
    <p class="subtitle">Change your text format instantly.</p>
    
    <textarea id="textInput" placeholder="Type or paste your text here..."></textarea>

    <div class="button-group">
        <button class="btn" onclick="transformText('upper')">UPPERCASE</button>
        <button class="btn" onclick="transformText('lower')">lowercase</button>
        <button class="btn" onclick="transformText('title')">Title Case</button>
    </div>

    <a href="index.html" class="back-link">← Back to Homepage</a>
</div>

<script>
    function transformText(type) {
        const textarea = document.getElementById('textInput');
        let currentText = textarea.value;

        if (type === 'upper') {
            textarea.value = currentText.toUpperCase();
        } else if (type === 'lower') {
            textarea.value = currentText.toLowerCase();
        } else if (type === 'title') {
            textarea.value = currentText
                .toLowerCase()
                .split(' ')
                .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                .join(' ');
        }
    }
</script>

</body>
</html>
