<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WriteBuddy - Character Counter</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; max-width: 800px; margin: 40px auto; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        p.subtitle { color: #7f8c8d; margin-top: 0; margin-bottom: 20px; }
        textarea { width: 100%; height: 200px; padding: 12px; box-sizing: border-box; border: 2px solid #bdc3c7; border-radius: 4px; font-size: 16px; resize: vertical; }
        textarea:focus { border-color: #0070f3; outline: none; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 20px; }
        .stat-box { background: #ecf0f1; padding: 15px; text-align: center; border-radius: 6px; }
        .stat-number { font-size: 28px; font-weight: bold; color: #0070f3; }
        .stat-label { font-size: 14px; color: #7f8c8d; text-transform: uppercase; }
        .back-link { display: inline-block; margin-top: 25px; color: #7f8c8d; text-decoration: none; font-size: 14px; }
        .back-link:hover { color: #333; }
    </style>
</head>
<body>
<div class="container">
    <h1>Character Counter</h1>
    <p class="subtitle">Perfect for social media limits (like X/Twitter, LinkedIn) and meta descriptions.</p>
    
    <textarea id="textInput" placeholder="Start typing here..."></textarea>

    <div class="stats-grid">
        <div class="stat-box">
            <div id="withSpaces" class="stat-number">0</div>
            <div class="stat-label">Characters (With Spaces)</div>
        </div>
        <div class="stat-box">
            <div id="noSpaces" class="stat-number">0</div>
            <div class="stat-label">Characters (No Spaces)</div>
        </div>
    </div>

    <a href="index.html" class="back-link">← Back to Dashboard</a>
</div>

<script>
    const textInput = document.getElementById('textInput');
    const withSpaces = document.getElementById('withSpaces');
    const noSpaces = document.getElementById('noSpaces');

    textInput.addEventListener('input', () => {
        const text = textInput.value;
        withSpaces.textContent = text.length;
        noSpaces.textContent = text.replace(/\s/g, '').length;
    });
</script>
</body>
</html>
