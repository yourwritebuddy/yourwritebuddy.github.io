<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Word Counter | YourWriteBuddy</title><meta name="description" content="Free online Word Counter. Count words, characters, sentences, paragraphs and reading time instantly."><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f8fafc;
color:#222;
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
}

.header{
text-align:center;
margin-bottom:30px;
}

.header h1{
color:#2563eb;
margin-bottom:10px;
}

.home-btn{
display:inline-block;
margin-top:10px;
text-decoration:none;
background:#2563eb;
color:white;
padding:10px 20px;
border-radius:8px;
}

.tool{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,.08);
}

textarea{
width:100%;
height:250px;
padding:15px;
font-size:16px;
border:1px solid #ddd;
border-radius:10px;
resize:vertical;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:#f8fafc;
padding:20px;
border-radius:12px;
text-align:center;
}

.card h3{
color:#666;
font-size:14px;
margin-bottom:10px;
}

.card span{
font-size:28px;
font-weight:bold;
color:#2563eb;
}

.buttons{
margin-top:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.copy{
background:#2563eb;
color:white;
}

.clear{
background:#ef4444;
color:white;
}

footer{
text-align:center;
margin-top:30px;
color:#777;
}

</style></head><body><div class="container"><div class="header">
<h1>Word Counter</h1>
<p>Count words, characters, sentences and reading time instantly.</p><a href="index.html" class="home-btn">
← Back to Home
</a></div><div class="tool"><textarea id="text" placeholder="Type or paste your text here..."></textarea><div class="stats"><div class="card">
<h3>Words</h3>
<span id="words">0</span>
</div><div class="card">
<h3>Characters</h3>
<span id="characters">0</span>
</div><div class="card">
<h3>Sentences</h3>
<span id="sentences">0</span>
</div><div class="card">
<h3>Paragraphs</h3>
<span id="paragraphs">0</span>
</div><div class="card">
<h3>Reading Time</h3>
<span id="reading">0 min</span>
</div></div><div class="buttons">
<button class="copy" onclick="copyText()">Copy Text</button>
<button class="clear" onclick="clearText()">Clear Text</button>
</div></div><footer>
© 2026 YourWriteBuddy
</footer></div><script>

const textArea=document.getElementById("text");

textArea.addEventListener("input",update);

function update(){

let text=textArea.value;

let words=text.trim()===""
?0
:text.trim().split(/\s+/).length;

let characters=text.length;

let sentences=text.trim()===""
?0
:text.split(/[.!?]+/)
.filter(s=>s.trim()!=="").length;

let paragraphs=text.trim()===""
?0
:text.split(/\n+/)
.filter(p=>p.trim()!=="").length;

let reading=Math.ceil(words/200);

document.getElementById("words").textContent=words;
document.getElementById("characters").textContent=characters;
document.getElementById("sentences").textContent=sentences;
document.getElementById("paragraphs").textContent=paragraphs;
document.getElementById("reading").textContent=reading+" min";

}

function copyText(){
navigator.clipboard.writeText(textArea.value);
alert("Text copied!");
}

function clearText(){
textArea.value="";
update();
}

update();

</script></body>
</html>
